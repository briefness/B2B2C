# B2B2C Wallet CI/CD 构建配置
#
# 支持多租户、多渠道自动化打包

name: B2B2C Wallet Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - customerA
          - customerB
          - customerC
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

env:
  # Rust 配置
  RUST_BACKTRACE: 1
  RUST_MIN_STACK: 8388608
  
  # Flutter 配置
  FLUTTER_VERSION: '3.16.0'
  FLUTTER_BUILD_TIMEOUT: 300

jobs:
  # ==================== Android 构建 ====================
  build-android:
    runs-on: ubuntu-latest
    if: "inputs.platform == 'all' || inputs.platform == 'android'"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'rust_core -> target'
          
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build Rust Core (Android)
        run: |
          cd rust_core
          cargo build --release --target aarch64-linux-android
          cargo build --release --target armv7-linux-androideabi
          cargo build --release --target x86_64-linux-android
          cargo build --release --target i686-linux-android
          
      - name: Build Android APK (All Flavors)
        run: |
          flutter build apk --flavor customerA --obfuscate --split-debug-info=./symbols
          flutter build apk --flavor customerB --obfuscate --split-debug-info=./symbols
          flutter build apk --flavor customerC --obfuscate --split-debug-info=./symbols
          
      - name: Build Android AAB (All Flavors)
        run: |
          flutter build appbundle --flavor customerA --obfuscate --split-debug-info=./symbols
          flutter build appbundle --flavor customerB --obfuscate --split-debug-info=./symbols
          flutter build appbundle --flavor customerC --obfuscate --split-debug-info=./symbols
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds-${{ github.run_number }}
          path: |
            build/app/outputs/apk/**/customer*/app-*.apk
            build/app/outputs/bundle/**/customer*/app-*.aab
          retention-days: 30
          
      - name: Upload Symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-symbols-${{ github.run_number }}
          path: symbols/
          retention-days: 90

  # ==================== iOS 构建 ====================
  build-ios:
    runs-on: macos-latest
    if: "inputs.platform == 'all' || inputs.platform == 'ios'"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          architecture: x64
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-ios,x86_64-apple-ios'
          
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'rust_core -> target'
          
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build Rust Core (iOS)
        run: |
          cd rust_core
          cargo build --release --target aarch64-apple-ios
          cargo build --release --target x86_64-apple-ios
          
      - name: Setup iOS Code Signing
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          
      - name: Get iOS Provisioning Profiles
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # 模拟获取描述文件
          echo "Provisioning profiles would be fetched here"
          
      - name: Build iOS (Customer A)
        run: |
          flutter build ios --simulator --no-codesign --flavor customerA
          
      - name: Build iOS (Customer B)
        run: |
          flutter build ios --simulator --no-codesign --flavor customerB
          
      - name: Build iOS (Customer C)
        run: |
          flutter build ios --simulator --no-codesign --flavor customerC
          
      - name: Build iOS IPA (All Flavors)
        if: github.ref == 'refs/heads/main'
        run: |
          flutter build ipa --obfuscate --split-debug-info=./symbols --flavor customerA
          flutter build ipa --obfuscate --split-debug-info=./symbols --flavor customerB
          flutter build ipa --obfuscate --split-debug-info=./symbols --flavor customerC
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds-${{ github.run_number }}
          path: |
            build/ios/iphonesimulator/**/*.app
            build/ios/ipa/**/*.ipa
          retention-days: 30

  # ==================== 安全扫描 ====================
  security-scan:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Run Flutter Analyzer
        run: |
          flutter pub get
          flutter analyze
          
      - name: Run Dart Security Audit
        run: |
          dart pub outdated --mode=outdated || true
          
      - name: Run Rust Audit
        run: |
          cargo install cargo-audit || true
          cd rust_core && cargo audit || true
          
      - name: Run Dependency Check
        uses: snyk/actions/dart@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: '--severity-threshold=high'

  # ==================== 部署通知 ====================
  notify:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, security-scan]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Android: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- iOS: ${{ needs.build-ios.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
